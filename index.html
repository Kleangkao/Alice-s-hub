<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alice's Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       CSS Variables – edit these to tweak colors
       ============================================ */
    :root {
      --bg-page: #fff9be;
      --text-primary: #6b4f3a; /* warm fantasy body text */
      --text-secondary: #d6b87a; /* accent / subtle secondary */
      /* Card – soft translucent surface, integrated with background */
      --card-bg: rgba(255, 252, 245, 0.68);
      --card-bg-hover: rgba(255, 252, 248, 0.82);
      --card-border: rgba(232, 201, 255, 0.5);
      --card-border-hover: rgba(201, 155, 255, 0.7);
      --card-shadow: 0 6px 20px rgba(67, 56, 34, 0.18), 0 0 18px rgba(239, 220, 186, 0.28);
      --card-shadow-hover: 0 10px 26px rgba(67, 56, 34, 0.25), 0 0 24px rgba(239, 220, 186, 0.4);
      --radius: 12px;
      --card-padding-y: 1.5rem;
      --card-padding-x: 1.8rem;
      --logo-size: 52px;
      --card-gap: 1.35rem;
      /* Soft accent colors – one per card, cohesive pastel set */
      --accent-1: #c97b63;
      --accent-2: #7a9e9f;
      --accent-3: #9b8bb4;
      --accent-4: #d4a574;
      --accent-5: #8b9dc3;
      --accent-6: #b892a6;
    }

    /* ============================================
       Base & layout
       ============================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text-primary);
      font-family: "Poppins", sans-serif;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.5;
      padding: 1.75rem 2rem 2.25rem 2rem;
      position: relative;
      background-color: var(--bg-page);
      background-image: url("./public/Bg-new.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Very light overlay – background image clear and vivid, page stays bright and readable */
    .page-overlay {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to right, rgba(15, 23, 42, 0.14) 0%, rgba(15, 23, 42, 0.0) 35%),
        radial-gradient(ellipse 100% 100% at 50% 40%, rgba(255, 255, 255, 0.16) 0%, rgba(255, 253, 248, 0.22) 40%, rgba(255, 253, 248, 0.32) 65%, rgba(255, 253, 248, 0.42) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Main UI container – title + grid */
    .hero {
      width: 100%;
      max-width: 880px;
      margin: 4.5rem auto 0 -9rem;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 1.1rem;
      position: relative;
      z-index: 1;
    }

    @media (min-width: 600px) {
      .hero {
        gap: 1.2rem;
      }
    }

    /* Centered outer shell for large screens */
    .page-shell {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ============================================
       Header – hero heading, centered
       ============================================ */
    header {
      text-align: center;
    }

    .site-title {
      margin: 0 0 1.3rem 0.35rem;
      font-size: clamp(3.4rem, 9vw, 5.4rem);
      font-weight: 600;
      letter-spacing: -0.035em;
      color: #fdfaf3;
      line-height: 1.04;
      text-shadow:
        0 0 18px rgba(252, 244, 215, 0.65),
        0 3px 14px rgba(0, 0, 0, 0.45);
    }

    /* ============================================
       Link cards grid
       ============================================ */
    .card-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: 1fr;
      gap: 0.85rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    @media (max-width: 600px) {
      .card-grid {
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
        gap: 0.7rem;
      }

      .card-link {
        min-height: 76px;
      }
    }

    .card-item {
      margin: 0;
      padding: 0;
      min-height: 0;
    }

    /* Cards – horizontal layout with comfortable padding and breathing room */
    .card-link {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: var(--card-gap);
      height: 100%;
      min-height: 112px;
      padding: var(--card-padding-y) var(--card-padding-x);
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      text-decoration: none;
      color: inherit;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .card-link:hover {
      transform: translateY(-2px);
      box-shadow: var(--card-shadow-hover);
      border-color: var(--card-border-hover);
      background: var(--card-bg-hover);
    }

    .card-link:focus {
      outline: none;
    }

    .card-link:focus-visible {
      outline: none;
      box-shadow: var(--card-shadow-hover), 0 0 0 2px var(--text-secondary);
    }

    /* Logo – left side of card, fixed size, no frame */
    .card-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--logo-size);
      height: var(--logo-size);
      min-width: var(--logo-size);
      flex-shrink: 0;
    }

    .card-logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Project name – right of logo, vertically centered */
    .card-title {
      margin: 0;
      padding: 0;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
      text-align: left;
      flex: 1;
      min-width: 0;
      overflow-wrap: break-word;
      word-break: break-word;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.45);
    }

    @media (min-width: 900px) {
      .card-title {
        font-size: 1.5rem;
      }
    }

    /* =====================
       Responsive layout
       ===================== */

    /* <= 1200px – keep two columns, minor top adjustment */
    @media (max-width: 1200px) {
      .hero {
        margin: 3rem auto 0 0;
      }
    }

    /* <= 900px – tablet: keep 2 columns, tighter spacing, pull block toward center */
    @media (max-width: 900px) {
      .hero {
        margin: 2.75rem auto 0 0;
        max-width: 620px;
      }

      .card-grid {
        gap: 0.7rem;
      }
    }

    /* <= 600px – mobile: 1 column, centered cards, smaller title */
    @media (max-width: 600px) {
      .hero {
        margin: 2rem 1.5rem 0 1.5rem;
        max-width: 100%;
      }

      header {
        text-align: center;
      }

      .site-title {
        margin: 0 0 0.9rem 0;
        font-size: clamp(2.1rem, 9vw, 2.6rem);
      }

      .card-grid {
        justify-items: stretch;
      }

      .card-link {
        min-height: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="page-overlay"></div>

  <div class="page-shell">
    <div class="hero">
    <header>
      <h1 class="site-title">Alice's Hub</h1>
    </header>

    <main>
      <ul class="card-grid" role="list">
        <li class="card-item">
          <a class="card-link" href="https://holosim-fleet-mining-calculator.vercel.app/" target="_blank" rel="noopener noreferrer">
            <span class="card-logo" aria-hidden="true">
              <img src="./public/Holosim-logo.jpg" alt="" loading="lazy">
            </span>
            <p class="card-title">Holosim Fleet<br>mining calculator</p>
          </a>
        </li>

        <li class="card-item">
          <a class="card-link" href="https://alicedaily.org/" target="_blank" rel="noopener noreferrer">
            <span class="card-logo" aria-hidden="true">
              <img src="./public/alice-daily-logo.png" alt="">
            </span>
            <p class="card-title">Alice Daily</p>
          </a>
        </li>

        <li class="card-item">
          <a class="card-link" href="https://aliceangels.net" target="_blank" rel="noopener noreferrer">
            <span class="card-logo" aria-hidden="true">
              <img src="./public/alice-angels-logo.png" alt="">
            </span>
            <p class="card-title">Alice's Angels</p>
          </a>
        </li>

        <li class="card-item">
          <a class="card-link" href="https://digitalshortcuts.org/" target="_blank" rel="noopener noreferrer">
            <span class="card-logo" aria-hidden="true">
              <img src="./public/Digital-shortcuts-logo.png" alt="">
            </span>
            <p class="card-title">Thailand Digital Shortcuts</p>
          </a>
        </li>

        <li class="card-item">
          <a class="card-link" href="https://x.com/AliceArcade" target="_blank" rel="noopener noreferrer">
            <span class="card-logo" aria-hidden="true">
              <img src="./public/alice-arcade-logo.png" alt="">
            </span>
            <p class="card-title">Alice's Arcade</p>
          </a>
        </li>

        <li class="card-item">
          <a class="card-link" href="https://x.com/CryptoAliceTH" target="_blank" rel="noopener noreferrer">
            <span class="card-logo" aria-hidden="true">
              <img src="./public/cryptoland-logo.png" alt="">
            </span>
            <p class="card-title">Alice in Cryptoland</p>
          </a>
        </li>
      </ul>
    </main>
    </div>
  </div>
</body>
</html>
